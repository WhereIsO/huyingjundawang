name: Windows Build and Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-package:
    runs-on: windows-latest

    env:
      QT_VERSION: "6.5.3"
      QT_ARCH: "win64_msvc2019_64"
      BUILD_DIR: build
      PACKAGE_NAME: BackupTool-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python for Qt installer
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Qt
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aqtinstall
          python -m aqt install-qt windows desktop $env:QT_VERSION $env:QT_ARCH -O "$env:RUNNER_TEMP\Qt"
          $qtPrefix = "$env:RUNNER_TEMP\Qt\$env:QT_VERSION\msvc2019_64"
          "QT_PREFIX=$qtPrefix" >> $env:GITHUB_ENV
          "$qtPrefix\bin" >> $env:GITHUB_PATH

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B $env:BUILD_DIR `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_PREFIX" `
            -DBACKUP_ALLOW_GTEST_DOWNLOAD=ON

      - name: Build
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --config Release --parallel

      - name: Test
        shell: pwsh
        run: ctest --test-dir $env:BUILD_DIR -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          .\scripts\package_windows.ps1 `
            -BuildDir $env:BUILD_DIR `
            -Config Release `
            -PackageDir "$env:BUILD_DIR\package\$env:PACKAGE_NAME" `
            -ZipPath "$env:BUILD_DIR\$env:PACKAGE_NAME.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.BUILD_DIR }}/${{ env.PACKAGE_NAME }}.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = "$env:BUILD_DIR\$env:PACKAGE_NAME.zip"
          gh release view $tag 1>$null 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title "BackupTool $tag" --generate-notes
          }
